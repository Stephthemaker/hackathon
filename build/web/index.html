<html lang="en">

<head>
  <base href="/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description"
    content="Department of Computer Science at Stellenbosch University — leading research, innovative programmes, and student resources in the heart of the Western Cape.">
  <meta name="theme-color" content="#61223B">

  <!-- Open Graph -->
  <meta property="og:title" content="CS Department — Stellenbosch University">
  <meta property="og:description"
    content="World-class computer science research, teaching, and community impact in Africa.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://cs.sun.ac.za/">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="CS Department — Stellenbosch University">
  <meta name="twitter:description"
    content="World-class computer science research, teaching, and community impact in Africa.">
  <meta name="twitter:image" content="https://cs.sun.ac.za/assets/assets/general/og-preview.png">

  <link rel="canonical" href="https://cs.sun.ac.za/">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="CS@SU">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/svg+xml" href="assets/assets/general/favicon.svg" />
  <link rel="alternate icon" type="image/svg+xml" href="assets/assets/general/favicon.svg" />

  <title>Department of Computer Science — Stellenbosch University</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="print.css" media="print">
</head>

<body>
  <!-- Loading indicator shown while Flutter initializes -->
  <style>
    .loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #F5F4F2;
      z-index: 999;
      transition: opacity 0.3s ease;
    }

    .loading-indicator.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #E5E0D8;
      border-top-color: #61223B;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-text {
      margin-top: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: #6B6B6B;
      letter-spacing: 0.5px;
    }
  </style>
  <div id="loading" class="loading-indicator">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading...</div>
  </div>
  <script>
    // Remove loading indicator once Flutter renders first frame
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) { el.classList.add('fade-out'); setTimeout(function () { el.remove(); }, 350); }
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>

</html>
